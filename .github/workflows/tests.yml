name: tests

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: python -m ruff check src tests examples plans/quantaengine-mvp-v1/execution plans/codebase-remediation-2026-06-21/execution
      - name: Format
        run: python -m ruff format --check src tests examples plans/quantaengine-mvp-v1/execution plans/codebase-remediation-2026-06-21/execution
      - name: Type check
        run: python -m mypy src
      - name: Coverage contracts
        run: python plans/codebase-remediation-2026-06-21/execution/check_coverage.py
      - name: Build wheel
        run: python -m build
      - name: Installed wheel smoke test
        shell: bash
        run: |
          python -m venv /tmp/quanta-wheel-smoke
          /tmp/quanta-wheel-smoke/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/quanta-wheel-smoke/bin/python -c "import cosmogenesis, quanta_engine, quantaengine, quantaengine_lattice; assert {cosmogenesis.__version__, quanta_engine.__version__, quantaengine.__version__, quantaengine_lattice.__version__} == {'0.3.0'}"
          /tmp/quanta-wheel-smoke/bin/genesis-arena --workspace "$GITHUB_WORKSPACE" theory-list

  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Test
        run: python -m pytest
      - name: Generate standard universe
        run: quanta run configs/standard_universe.yaml --output reports/standard.md --json reports/standard.json
      - name: Verify executable plan scenarios
        run: python plans/quantaengine-mvp-v1/execution/run_acceptance.py --skip-tooling
