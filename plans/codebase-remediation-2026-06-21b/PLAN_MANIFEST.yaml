acceptance_gates:
  - command: ["{python}", "-m", "pytest"]
  - command: ["{python}", "-m", "ruff", "check", "src", "tests"]
  - command: ["{python}", "-m", "ruff", "format", "--check", "src", "tests"]
  - command: ["{python}", "-m", "mypy", "src"]
  - command: ["{python}", "plans/codebase-remediation-2026-06-21/execution/check_coverage.py"]

invariants:
  - 各方案永不合并（allow_merge 恒 False）
  - 采纳建议必须由接收方自身模型独立判定，绝不盲从
  - 实现不得降低既有覆盖率门槛或破坏确定性
