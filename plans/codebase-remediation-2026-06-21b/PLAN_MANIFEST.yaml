findings:
  - id: QE-2026-101
    severity: P1
    area: adversarial independent-consider loop
    intent: 接收方在自身 objective 下独立复核攻击方建议，自证改进才采纳，绝不合并
    planned_changes:
      - src/cosmogenesis/arena/cards.py        # 规范 ChallengeCard.suggestion(ParameterVector)
      - src/cosmogenesis/core/protocol.py       # BaseEngine.consider(suggestion) -> Decision
      - src/cosmogenesis/schemes/*/engine.py    # 各方案实现独立复核（复用已退役 consider 模式）
      - src/cosmogenesis/arena/duel.py          # 挑战后目标方独立 consider，记录采纳/拒绝
      - src/cosmogenesis/arena/ledger.py        # history 记录 suggestion_source/considered/adopted/reason
    planned_regression: tests/test_remediation_b.py::test_suggestion_adopted_only_if_self_verified_improvement
  - id: QE-2026-102
    severity: P1
    area: scoring objective integrity
    planned_changes:
      - src/cosmogenesis/arena/scoring.py       # efficiency 实测、simplicity 真实计数、弱目标退出硬 Pareto
    planned_regression: tests/test_remediation_b.py::test_scoring_objectives_are_measured_not_declared
  - id: QE-2026-103
    severity: P1
    area: physics calibration and uncertainty
